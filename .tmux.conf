# === Core ergonomics ===
set -g mouse on
set -g history-limit 1000000
set -g focus-events on
setw -g mode-keys vi
set -g status-keys emacs
set -g pane-scrollbars modal

set -g base-index 1                # windows start at 1, easier to reach
setw -g pane-base-index 1
set -g  renumber-windows on        # close window 2, window 3 becomes 2
set -g  set-clipboard on           # OSC-52 keyboard

# === Terminal capabilities ===
set -s  default-terminal "tmux-256color" # apps inside tmux see this TERM
set -s  extended-keys on                 # Pass on CSI-u to apps that support it (e.g. nvim)
set -s  extended-keys-format csi-u
set -as terminal-features ",*:hyperlinks:osc7"  # Outer terminal supports hyperlinks (OSC-8) and cwd (OSC-7)

# === Hotkeys ===
bind -n C-Left previous-window
bind -n C-Right next-window
bind -n C-t display-popup -E -d "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
bind -T copy-mode-vi < send-keys -X previous-prompt     # Start of previous prompt
bind -T copy-mode-vi > send-keys -X next-prompt         # Start of next prompt
bind -T copy-mode-vi [ send-keys -X previous-prompt -o  # Start of previous command output
bind -T copy-mode-vi ] send-keys -X next-prompt -o      # Start of next command output

# === Beautification ===
set -g status-position top
set -g status-style "bg=terminal,fg=terminal"
set -g status-justify absolute-centre
set -g status-left-length 40
set -g status-left " #h:#[fg=brightblack]#S "
set -g @root_help "‹C-␣=Menu›  ‹C-←→=Window›  ‹C-t=Popup›"
set -g @mode_help "‹␣=Select›  ‹↵=Copy›  ‹><=Prompt›  ‹][=Output›"
set -g @help_data "#{?client_prefix,Prefix Mode,#{?pane_in_mode,#{@mode_help},#{@root_help}}}"
set -g status-right " #{s|‹([^=]+)=([^›]+)›|#[fg=terminal]\\1#[fg=brightblack] \\2|gr:#{E:@help_data}} "
set -g window-status-format "#[fg=brightblack,reverse] #W "
set -g window-status-current-format "#[fg=brightgreen,reverse] #W "
set -g window-status-separator ""
set -g pane-border-status top
set -g pane-border-format ""
set -g pane-border-lines double

# === Plugins (TPM) ===
set -g @plugin 'tmux-plugins/tpm'                   # Plugin manager
set -g @plugin 'tmux-plugins/tmux-resurrect'        # save/restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-continuum'		# periodic auto-save and auto-restore tmux sessions
set -g @plugin 'alexwforsythe/tmux-which-key'		# show possible keybindings after prefix
set -g @plugin 'christoomey/vim-tmux-navigator'		# navigate tmux panes with vim keys (C-hjkl)

# === Saving and restoring tmux sessions ===
set -g @continuum-restore 'on'     # Auto-restore tmux sessions when tmux starts.
# Keep the 5 most recent snapshots, delete the rest after each save.
set -g @resurrect-hook-post-save-all \
  'ls -t "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect/tmux_resurrect_*.txt" | tail -n +6 | xargs -r rm -f'
# Save tmux sessions on detach.
set-hook -g client-detached 'run-shell "~/.tmux/plugins/tmux-resurrect/scripts/save.sh quiet"'

run '~/.tmux/plugins/tpm/tpm'
bind -n C-Space show-wk-menu-root  # Which-key menu
